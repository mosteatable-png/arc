<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>arc</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at center,#002446 0%,#020817 70%);
overflow:hidden;
color:white;
}

/* random stars */
body:before{
content:"";
position:absolute;
inset:0;
background-image:
radial-gradient(circle at 10% 20%,white 2px,transparent 0),
radial-gradient(circle at 70% 60%,white 2px,transparent 0),
radial-gradient(circle at 80% 15%,white 1px,transparent 0),
radial-gradient(circle at 20% 80%,white 2px,transparent 0),
radial-gradient(circle at 50% 90%,white 1px,transparent 0);
opacity:.6;
}

.card{
width:520px;
padding:45px;

background:rgba(6,15,30,.85);

border-radius:35px;

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 100px rgba(0,160,255,.15);

backdrop-filter:blur(10px);

text-align:center;

position:relative;
z-index:5;
}

.pfp{
width:130px;
height:130px;
margin:auto;
border-radius:50%;
overflow:hidden;

padding:4px;

background:
linear-gradient(
135deg,
#00d5ff,
#004cff
);

box-shadow:
0 0 30px rgba(0,220,255,.4);
}

.pfp img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
display:block;
}

h1{
margin-top:20px;
font-size:70px;
font-weight:900;
}

.user{
color:#8a91a8;
font-size:20px;
margin-top:5px;
}

.bio{
margin-top:25px;
line-height:1.7;
font-size:18px;
color:#c6d0df;
}

.skills{
margin-top:30px;

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.skill{
padding:12px 22px;
border-radius:999px;

background:#11192d;

border:1px solid rgba(255,255,255,.05);

transition:.2s;
}

.skill:hover{
transform:translateY(-4px);
background:#182746;
}

.footer{
margin-top:40px;
color:#6d7587;
}
</style>
</head>

<body>

<div class="card">

<div class="pfp">
<img src="pfp.jpeg">
</div>

<h1>arc</h1>

<div class="user">
@xxyvzxxx • he/him
</div>

<div class="bio">
Developer, modder, and making random VR stuff.
</div>

<div class="skills">
<div class="skill">Developer</div>
<div class="skill">VR Modding</div>
<div class="skill">HTML</div>
<div class="skill">Python</div>
<div class="skill">C++</div>
<div class="skill">Projects</div>
</div>

<div class="footer">
arcmodding © 2026
</div>

</div>

</body>
</html>
