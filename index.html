<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>arc</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#061120;
overflow:hidden;
color:white;
padding:20px;
}

/* softer stars */
body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at 15% 30%,white 1px,transparent 2px),
radial-gradient(circle at 70% 20%,white 1px,transparent 2px),
radial-gradient(circle at 40% 80%,white 1px,transparent 2px),
radial-gradient(circle at 90% 70%,white 1px,transparent 2px),
radial-gradient(circle at 30% 60%,white 2px,transparent 3px);
opacity:.45;
pointer-events:none;
}

/* slight blue glow behind card */
.glow{
position:absolute;
width:500px;
height:500px;
background:#00b7ff22;
filter:blur(120px);
border-radius:50%;
}

.card{
width:420px;
background:rgba(17,25,40,.75);
backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,.08);

padding:35px;
border-radius:28px;

transform:rotate(-0.8deg);

box-shadow:
0 10px 40px rgba(0,0,0,.45);

position:relative;
z-index:2;
}

.top{
display:flex;
align-items:center;
gap:18px;
margin-bottom:25px;
}

.pfp{
width:90px;
height:90px;
border-radius:50%;
overflow:hidden;
border:3px solid rgba(255,255,255,.15);

flex-shrink:0;
}

.pfp img{
width:100%;
height:100%;
object-fit:cover;
}

.name{
font-size:42px;
font-weight:800;
}

.user{
color:#8c95a7;
margin-top:3px;
}

.bio{
margin:25px 0;
color:#cbd5e1;
line-height:1.5;
font-size:15px;
}

.badges{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.badge{
padding:10px 14px;
background:#101827;
border-radius:999px;
border:1px solid rgba(255,255,255,.06);
font-size:14px;
transition:.25s;
}

.badge:hover{
transform:translateY(-3px);
}

.footer{
margin-top:25px;
font-size:13px;
color:#6b7280;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="card">

<div class="top">

<div class="pfp">
<img src="./pfp.jpeg">
</div>

<div>
<div class="name">arc</div>
<div class="user">@xxyvzxxx • he/him</div>
</div>

</div>

<div class="bio">
Building websites, VR projects, and random ideas. Still adding more stuff.
</div>

<div class="badges">
<div class="badge">Developer</div>
<div class="badge">VR Modding</div>
<div class="badge">HTML</div>
<div class="badge">Python</div>
<div class="badge">Learning C++</div>
<div class="badge">Projects</div>
</div>

<div class="footer">
arcmodding © 2026
</div>

</div>

</body>
</html>
