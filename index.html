<!DOCTYPE html>
<html>
<head>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#00d9ff22,#000814),
#020617;
overflow:hidden;
}

/* stars */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px,transparent 1px);
background-size:50px 50px;
opacity:.6;
animation:stars 20s linear infinite;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(100px);}
}

.card{
width:420px;
padding:35px;
border-radius:35px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);

box-shadow:
0 0 50px #00eaff30,
inset 0 0 20px #ffffff10;

text-align:center;
position:relative;
z-index:2;
}

.profile{
width:140px;
height:140px;
border-radius:50%;
margin:auto;
padding:4px;

background:linear-gradient(
45deg,
#00eaff,
#009dff,
#00ffcc
);

animation:spin 5s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
border:4px solid #09111f;
}

h1{
color:white;
font-size:50px;
margin-top:18px;
text-shadow:0 0 25px cyan;
}

.user{
color:#9ca3af;
font-size:18px;
margin-top:6px;
}

.bio{
margin:25px 0;
color:#00eaff;
font-weight:bold;
}

.skills{
display:grid;
grid-template-columns:
repeat(2,1fr);
gap:12px;
}

.skill{
padding:14px;
border-radius:15px;

background:rgba(255,255,255,.06);

color:white;
transition:.3s;
border:1px solid #ffffff12;
}

.skill:hover{
transform:scale(1.05);
background:#00eaff25;
box-shadow:0 0 20px cyan;
}
</style>
</head>

<body>

<div class="card">

<div class="profile">
<img src="https://imgur.com/19959561-c518-4a41-9d25-4c0040728596">
</div>

<h1>arc</h1>

<div class="user">
@xxyvzxxx • he/him
</div>

<div class="bio">
AMH website coming soon 🚀
</div>

<div class="skills">
<div class="skill">💻 Developer</div>
<div class="skill">🛠 Modder</div>
<div class="skill">🌐 HTML</div>
<div class="skill">🐍 Python</div>
<div class="skill">⚡ C++</div>
<div class="skill">🎮 VR Creator</div>
</div>

</div>

</body>
</html>
