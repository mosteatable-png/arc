<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Spectra</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
cursor:url('https://cur.cursors-4u.net/cursors/cur-11/cur1054.cur'), auto;
}

body{
background:black;
font-family:'Poppins',sans-serif;
overflow:hidden;
color:white;
}

/* ENTER SCREEN */

#overlay{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.enter-btn{
padding:30px 80px;
font-size:50px;
border:3px solid white;
border-radius:25px;
background:transparent;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px white;
}

.enter-btn:hover{
transform:scale(1.05);
box-shadow:0 0 40px cyan;
}

/* MAIN CARD */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:500px;
padding:30px;
border-radius:25px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 0 40px rgba(255,255,255,0.2);
text-align:center;
display:none;
}

/* PROFILE */

.pfp{
width:130px;
height:130px;
border-radius:50%;
border:3px solid cyan;
box-shadow:0 0 30px cyan;
object-fit:cover;
}

.username{
font-size:42px;
font-weight:700;
margin-top:15px;
}

.sub{
opacity:0.7;
margin-top:-5px;
}

.bio{
margin-top:20px;
font-size:15px;
opacity:0.8;
}

/* BADGES */

.badges{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.badge{
padding:8px 14px;
border-radius:12px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
font-size:14px;
}

/* BUTTONS */

.buttons{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
}

.btn{
padding:12px 24px;
border-radius:15px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
color:white;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 20px cyan;
}

/* BACKGROUND PARTICLES */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}
</style>
</head>

<body>

<div id="overlay">
<button class="enter-btn" onclick="enterSite()">Click to Enter</button>
</div>

<div class="container" id="main">

<img class="pfp" src="https://i.imgur.com/2DhmtJ4.png">

<div class="username">Project Spectra</div>
<div class="sub">@spectra • he/him</div>

<div class="bio">
Developer • Designer • Creator
</div>

<div class="badges">
<div class="badge">Developer</div>
<div class="badge">HTML</div>
<div class="badge">Python</div>
<div class="badge">Designer</div>
</div>

<div class="buttons">
<a class="btn" href="#">Discord</a>
<a class="btn" href="#">GitHub</a>
</div>

</div>

<canvas id="bg"></canvas>

<script>

/* ENTER SCREEN */

function enterSite(){
document.getElementById("overlay").style.display="none";
document.getElementById("main").style.display="block";
}

/* PARTICLES */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

p.x += p.dx;
p.y += p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
